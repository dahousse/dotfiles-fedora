[desktop/interface]
cursor-blink=true
cursor-blink-time=1200
cursor-size=24
cursor-theme='Adwaita'
font-name='Noto Sans 11'
gtk-im-module='gtk-im-context-simple:xim'
gtk-key-theme=''
gtk-theme='WhiteSur-Dark'
icon-theme='AUTHORS'

[desktop/peripherals/mouse]
double-click=400
drag-threshold=8

[desktop/sound]
event-sounds=false
input-feedback-sounds=false
theme-name='default'

[desktop/wm/preferences]
action-middle-click-titlebar='lower'
button-layout=':'

[login-screen]
enable-fingerprint-authentication=true
enable-smartcard-authentication=false
enable-switchable-authentication=false

[nautilus/preferences]
default-folder-viewer='list-view'
migrated-gtk-settings=true

[nautilus/window-state]
initial-size=(890, 550)
maximized=true

[software]
check-timestamp=int64 1782847687
first-run=false
flatpak-purge-timestamp=int64 1782854803
update-notification-timestamp=int64 1782847729
